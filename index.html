<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/x-icon" href="/favicon_io/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon_io/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon_io/favicon-16x16.png" />
    <link rel="apple-touch-icon" href="/favicon_io/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kaan Demir</title>
    <style>
      #preloader {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #0a0a0a;
        color: rgba(255, 255, 255, 0.9);
        transition: opacity 450ms ease;
      }

      #preloader.is-hidden {
        opacity: 0;
        pointer-events: none;
      }

      #preloader .preloader-eyebrow {
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 11px;
        font-weight: 600;
        letter-spacing: 0.55em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.4);
      }

      #preloader .preloader-title {
        margin-top: 12px;
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        font-size: 34px;
        font-weight: 800;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.9);
      }

      #preloader .preloader-rail {
        margin-top: 28px;
        height: 1px;
        width: 220px;
        overflow: hidden;
        background: rgba(255, 255, 255, 0.12);
      }

      #preloader .preloader-bar {
        height: 100%;
        width: 0%;
        background: rgba(255, 255, 255, 0.7);
        animation: preloader-bar 2.7s ease-out infinite;
      }

      @keyframes preloader-bar {
        0% {
          width: 0%;
        }
        20% {
          width: 35%;
        }
        55% {
          width: 70%;
        }
        100% {
          width: 92%;
        }
      }
    </style>
  </head>
  <body>
    <div id="preloader" role="status" aria-live="polite">
      <div class="preloader-eyebrow">Portfolio</div>
      <div class="preloader-title">Kaan Demir</div>
      <div class="preloader-rail" aria-hidden="true">
        <div class="preloader-bar"></div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
